<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container my-3">
    <table class="table">
        <thead class="table-dark">
        <tr>
            <th>순번</th>
            <th style="width:50%">제목</th>
            <th>글쓴이</th>
            <th>작성일시</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="question, loop : ${paging}">
            <td th:text="${paging.getTotalElements - (paging.number * paging.size) - loop.index}"></td>
            <td>
                <a th:href="@{|/question/view/${question.id}|}" th:text="${question.subject}"></a>
                <span class="text-danger small ms-2"
                      th:if="${#lists.size(question.answerList) > 0}"
                      th:text="${#lists.size(question.answerList)}">
                </span>
            </td>
            <td>
                <span th:if="${question.author != null}" th:text="${question.author.username}"></span>
            </td>
            <td th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></td> <!-- <td>[[${question.createDate}]]</td>-->
        </tr>
        </tbody>
    </table>

    <div th:if="${!paging.isEmpty()}"
         th:with="blockSize=10,
              startPage=${(paging.number / blockSize) * blockSize},
              endPage=${(startPage + blockSize - 1 < paging.totalPages) ? (startPage + blockSize - 1) : (paging.totalPages - 1)}">

        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${paging.first} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=0|}">
                    <span>처음</span>
                </a>
            </li>

            <li class="page-item" th:classappend="${startPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${startPage - 1}|}">
                    <span>이전</span>
                </a>
            </li>

            <li th:each="page: ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${page == paging.number} ? 'active'"
                class="page-item">
                <a th:text="${page + 1}" class="page-link" th:href="@{|?page=${page}|}"></a>
            </li>

            <li class="page-item" th:classappend="${endPage >= paging.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${endPage + 1}|}">
                    <span>다음</span>
                </a>
            </li>

            <li class="page-item" th:classappend="${paging.last} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${paging.totalPages - 1}|}">
                    <span>끝</span>
                </a>
            </li>

        </ul>
    </div>

    <a th:href="@{/question/chuga}" class="btn btn-primary">질문 등록하기</a>

    <br><br>
    전체 게시물 개수 : <span th:text="${paging.getTotalElements}"></span><br>
    현재 페이지 번호 : <span th:text="${paging.number}"></span><br>
    페이지당 게시물 개수 : <span th:text="${paging.size}"></span><br>
</div>

</html>
