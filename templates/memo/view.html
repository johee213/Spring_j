<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>메모 상세보기</h1>

<table border="1" align="center" style="width: 80%;">
    <tr>
        <td>순번 : </td>
        <td th:text="${memo.id}"></td>
    </tr>
    <tr>
        <td>작성자 : </td>
        <td th:text="${memo.writer}"></td>
    </tr>
    <tr>
        <td>내용 : </td>
        <td>[[${memo.content}]]</td>
    </tr>
    <tr>
        <td>등록일 : </td>
        <td>[[${memo.createdDate}]]</td>
    </tr>
    <tr>
        <td>수정일 : </td>
        <td>[[${memo.modifiedDate}]]</td>
    </tr>
</table>

<br>
