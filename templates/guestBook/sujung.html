<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>방명록 수정</h1>

<form name="form" method="post" action="/guestBook/sujungProc">
    <input type="hidden" name="id" th:value="${guestBook.id}">
    <input type="hidden" name="name" th:value="${guestBook.name}">

<!--    이름(*) : <input type="text" name="name" th:value="${guestBook.name}"><br>-->
    이름 : <span th:text="${guestBook.name}"></span><br>
    이메일(*) : <input type="text" name="email" th:value="${guestBook.email}"><br>
    비밀번호(*) : <input type="password" name="passwd"><br>
    내용 : <textarea name="content" style="width:200px; height:80px;">[[${guestBook.content}]]</textarea><br>
    <br>
    <button type="button" onclick="save();">수정하기</button>
</form>

<script>
    function save() {
        if (document.form.name.value == '') {
            alert('이름을 입력하세요.');
            document.form.name.focus();
            return;
        }

        if (document.form.email.value == '') {
            alert('이메일을 입력하세요.');
            document.form.email.focus();
            return;
        }

        if (document.form.passwd.value == '') {
            alert('비밀번호를 입력하세요.');
            document.form.passwd.focus();
            return;
        }

        document.form.submit();
    }
</script>

</body>
</html>
