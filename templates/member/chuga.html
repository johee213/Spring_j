<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form name="chugaForm">
<table border="1" align="center" style="width: 80%;">
    <tr>
        <td colspan="2">
            <h1>회원 등록</h1>
        </td>
    </tr>
    <tr>
        <td width="150">아이디 : </td>
        <td><input type="text" name="username" id="username"></td>
    </tr>
    <tr>
        <td>비밀번호 : </td>
        <td><input type="password" name="password" id="password"></td>
    </tr>
    <tr>
        <td>비밀번호확인 : </td>
        <td><input type="password" name="passwordChk" id="passwordChk"></td>
    </tr>
    <tr>
        <td>이름 : </td>
        <td><input type="text" name="name" id="name"></td>
    </tr>
    <tr>
        <td>이메일 : </td>
        <td><input type="text" name="email" id="email"></td>
    </tr>
    <tr>
        <td>주민번호 : </td>
        <td>
            <input type="text" name="ssn1" id="ssn1" style="width: 60px;">
            -
            <input type="text" name="ssn2" id="ssn2" style="width: 60px;">
        </td>
    </tr>
    <tr>
        <td>주소 : </td>
        <td>
            <input type="text" id="sample6_postcode" placeholder="우편번호" name="address1">
            <input type="button" onclick="sample6_execDaumPostcode()" value="우편번호 찾기"><br>
            <input type="text" id="sample6_address" placeholder="주소" name="address2"><br>
            <input type="text" id="sample6_detailAddress" placeholder="상세주소" name="address3">
            <input type="text" id="sample6_extraAddress" placeholder="참고항목" name="address4">
        </td>
    </tr>
    <tr>
        <td>권한</td>
        <td>
            <input type="radio" name="role" value="ADMIN"> ADMIN &nbsp;
            <input type="radio" name="role" value="USER" checked> USER &nbsp;
        </td>
    </tr>
    <tr>
        <td colspan="2" style="height: 30px;">
            <button type="button" onclick="chuga();">등록하기</button>
            <button type="button" onclick="move('/member/list');">목록으로</button>
        </td>
    </tr>
</table>
</form>

<script>
    function chuga() {
        if (confirm('등록할까요?')) {
            document.chugaForm.action = "/member/chugaProc";
            document.chugaForm.method = "post";
            document.chugaForm.submit();
        }
    }

    function move(value1) {
        location.href = value1;
        //location.href = '/member/list';
    }
</script>

</body>
</html>

<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function sample6_execDaumPostcode() {
        new kakao.Postcode({
            oncomplete: function(data) {
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var addr = ''; // 주소 변수
                var extraAddr = ''; // 참고항목 변수

                //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
                    addr = data.roadAddress;
                } else { // 사용자가 지번 주소를 선택했을 경우(J)
                    addr = data.jibunAddress;
                }

                // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
                if(data.userSelectedType === 'R'){
                    // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                    // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                    if(data.bname !== '' && /[동로가]$/.test(data.bname)){
                        extraAddr += data.bname;
                    }
                    // 건물명이 있고, 공동주택일 경우 추가한다.
                    if(data.buildingName !== '' && data.apartment === 'Y'){
                        extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                    if(extraAddr !== ''){
                        extraAddr = ' (' + extraAddr + ')';
                    }
                    // 조합된 참고항목을 해당 필드에 넣는다.
                    document.getElementById("sample6_extraAddress").value = extraAddr;

                } else {
                    document.getElementById("sample6_extraAddress").value = '';
                }

                // 우편번호와 주소 정보를 해당 필드에 넣는다.
                document.getElementById('sample6_postcode').value = data.zonecode;
                document.getElementById("sample6_address").value = addr;
                // 커서를 상세주소 필드로 이동한다.
                document.getElementById("sample6_detailAddress").focus();
            }
        }).open();
    }
</script>
