<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container my-3">
    <table class="table">
        <thead class="table-dark">
        <tr>
            <th>순번</th>
            <th>사용자아이디</th>
            <th>이메일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="siteUser, loop : ${paging}">
            <td th:text="${paging.getTotalElements - (paging.number * paging.size) - loop.index}"></td>
            <td>
                <a th:href="@{|/siteUser/view/${siteUser.id}|}" th:text="${siteUser.username}"></a>
            </td>
            <td th:text="${siteUser.email}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${!paging.isEmpty()}"
         th:with="blockSize=10,
              startPage=${(paging.number / blockSize) * blockSize},
              endPage=${(startPage + blockSize - 1 < paging.totalPages) ? (startPage + blockSize - 1) : (paging.totalPages - 1)}">

        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${paging.first} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=0|}">
                    <span>처음</span>
                </a>
            </li>

            <li class="page-item" th:classappend="${startPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${startPage - 1}|}">
                    <span>이전</span>
                </a>
            </li>

            <li th:each="page: ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${page == paging.number} ? 'active'"
                class="page-item">
                <a th:text="${page + 1}" class="page-link" th:href="@{|?page=${page}|}"></a>
            </li>

            <li class="page-item" th:classappend="${endPage >= paging.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${endPage + 1}|}">
                    <span>다음</span>
                </a>
            </li>

            <li class="page-item" th:classappend="${paging.last} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${paging.totalPages - 1}|}">
                    <span>끝</span>
                </a>
            </li>

        </ul>
    </div>

    <a th:href="@{/siteUser/chuga}" class="btn btn-primary">회원등록</a>
</div>

</html>
