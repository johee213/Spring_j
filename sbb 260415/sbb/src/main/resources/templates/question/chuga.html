<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content" class="container my-3">
  <h5 class="my-3 border-bottom pb-2">질문등록</h5>
  <form th:action="@{/question/chugaProc}" th:object="${questionDTO}" method="post">

<!--    <div class="alert alert-danger" role="alert" th:if="${#fields.hasAnyErrors()}">-->
<!--      <div th:each="err : ${#fields.allErrors()}" th:text="${err}" />-->
<!--    </div>-->
    <div th:replace="~{layout/form_errors :: formErrorsFragment}"></div>

    <div class="mb-3">
      <label for="subject" class="form-label">제목</label>
      <input type="text" id="subject" class="form-control" th:field="*{subject}">
    </div>
    <div class="mb-3">
      <label for="content" class="form-label">내용</label>
      <textarea id="content" class="form-control" rows="10" th:field="*{content}"></textarea>
    </div>
    <input type="submit" value="저장하기" class="btn btn-primary my-2">
  </form>
</div>

</html>
