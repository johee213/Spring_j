<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<nav th:fragment="navbarFragment" class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">SBB</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/siteUser/login}" sec:authorize="isAnonymous()">로그인</a>
<!--                    <a class="nav-link" th:href="@{/siteUser/logout}" sec:authorize="isAuthenticated()">로그아웃</a>-->

                    <form id="logoutForm" action="/siteUser/logout" method="post" style="display: none;">
                        <input type="text" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    </form>
                    <a class="nav-link" sec:authorize="isAuthenticated()" onclick="document.getElementById('logoutForm').submit();" style="cursor: pointer;">로그아웃</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/siteUser/chuga}" sec:authorize="isAnonymous()">회원가입</a
                    <a class="nav-link" th:href="@{/siteUser/sujung}" sec:authorize="isAuthenticated()">회원정보수정</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
