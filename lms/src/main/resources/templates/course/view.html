<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LMS - 강의 상세 정보</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .info-label { font-weight: bold; width: 150px; background-color: #f8f9fa; }
    </style>
</head>
<body class="container mt-5">

<div class="card mb-5">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0">강의 상세 정보</h4>
        <div>
            <a href="/course/list" class="btn btn-secondary">목록</a>
            <a href="/course/chuga" class="btn btn-secondary">등록</a>
            <a th:href="@{|/course/sujung/${course.id}|}" class="btn btn-secondary">수정</a>
            <a th:href="@{|/course/sakje/${course.id}|}" class="btn btn-secondary">삭제</a>
        </div>
    </div>

    <div class="card-body">
        <table class="table table-bordered">
            <tr>
                <td class="info-label">강의명</td>
                <td th:text="${course.title}">강의 제목</td>
            </tr>
            <tr>
                <td class="info-label">담당 강사</td>
                <td th:text="${course.instructor}">강사 이름</td>
            </tr>
            <tr>
                <td class="info-label">강의 설명</td>
                <td th:text="${course.description}">강의에 대한 상세 설명입니다.</td>
            </tr>
        </table>
    </div>
</div>


<div class="d-flex justify-content-between align-items-center mb-3">
    <h5><i class="bi bi-list-ol"></i> 커리큘럼 (차시 목록)</h5>
    <a th:href="@{|/lesson/chuga/${course.id}|}" class="btn btn-outline-primary btn-sm">
        + 차시 추가
    </a>
</div>


<table class="table table-hover border">
    <thead class="table-light">
    <tr>
        <th style="width: 80px;">순서</th>
        <th>차시 제목</th>
        <th>강의 영상</th>
        <th style="width: 150px;">관리</th>
    </tr>
    </thead>
    <tbody>
        <tr th:if="${#lists.isEmpty(lessonList)}">
            <td colspan="4" class="text-center py-4 text-muted">
                등록된 내용이 없습니다.
            </td>
        </tr>
        <tr th:each="lesson : ${lessonList}">
            <td th:text="${lesson.sequence}"></td>
            <td>
                <a th:href="@{|/lesson/view/${lesson.id}|}"
                   class="text-decoration-none text-dark fw-bold">
                    <i class="bi bi-play-btn-fill text-danger me-2"></i>
                    <span th:text="${lesson.title}">차시 제목</span>
                </a>
            </td>
            <td>
                <span th:if="${lesson.videoUrl != null and lesson.videoUrl != ''}">영상포함</span>
                <span th:unless="${lesson.videoUrl != null and lesson.videoUrl != ''}">영상미포함</span>
            </td>
            <td>
                <a th:href="@{|/lesson/sujung/${lesson.id}|}" class="btn btn-sm btn-outline-secondary">수정</a>
                /
                <a th:href="@{|/lesson/sakje/${lesson.id}|}" class="btn btn-sm btn-outline-danger">삭제</a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
