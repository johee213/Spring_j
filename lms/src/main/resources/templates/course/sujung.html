<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h2>강의 정보 수정</h2>

<form name="sujungForm" method="post" action="/course/sujungProc">
<input type="hidden" name="id" th:value="${course.id}">

강의명 : <input type="text" name="title" th:value="${course.title}"><br>
강사명 : <input type="text" name="instructor" th:value="${course.instructor}"><br>
설명 : <textarea rows="5" cols="50" name="description">[[${course.description}]]</textarea><br>
<button type="submit">수정하기</button>
</form>

</body>
</html>
