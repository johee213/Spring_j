<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LMS - 강의 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>새 강의 등록</h2>

<form name="chugaForm" method="post" action="/course/chugaProc" class="mt-4">

    <div class="mb-3">
        <label class="form-label">강의명</label>
        <input type="text" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">강사명</label>
        <input type="text" name="instructor" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">설명</label>
        <textarea rows="5" cols="50" name="description" class="form-control"></textarea>
    </div>

    <button type="submit" class="btn btn-success">등록하기</button>
    <a th:href="@{/course/list}" class="btn btn-secondary">목록으로</a>
</form>

</body>
</html>
