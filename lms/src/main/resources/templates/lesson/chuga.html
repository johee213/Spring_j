<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LMS - 차시 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>차시 등록</h2>

<form name="chugaForm" method="post" action="/lesson/chugaProc" class="mt-4" enctype="multipart/form-data">
<input type="hidden" name="courseId" th:value="${courseId}">

    <div class="mb-3">
        <label class="form-label">차시 제목</label>
        <input type="text" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">영상 파일 업로드</label>
        <input type="file" name="videoFile" class="form-control" accept="video/mp4,video/x-m4v,video/*">
    </div>

    <div class="mb-3">
        <label class="form-label">강의 자료 첨부 (PDF, ZIP 등)</label>
        <input type="file" name="attachFile" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">노출 순서</label>
        <input type="text" name="sequence" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">등록하기</button>
    <a th:href="@{|/course/view/${courseId}|}" class="btn btn-secondary">목록으로</a>
</form>

</body>
</html>
