<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${lesson.title}">학습 시청</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f6f7; }
        .sidebar { height: calc(100vh - 56px); overflow-y: auto; background: white; border-left: 1px solid #dee2e6; }
        .lesson-item.active { background-color: #e9ecef; border-left: 4px solid #0d6efd; }
        .video-container { background: black; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/course/view/{id}(id=${lesson.course.id})}">
            <i class="bi bi-chevron-left"></i> <span th:text="${lesson.course.title}">강의명</span>
        </a>
        <span class="navbar-text text-white fw-bold" th:text="${lesson.title}">현재 차시 제목</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-lg-9 p-4">
            <div class="video-container shadow">
                <div class="ratio ratio-16x9">

                    <!--                    <iframe th:src="${lesson.videoUrl}"  title="Lesson Video" allowfullscreen></iframe>-->
                    <div class="video-container shadow">
                        <div class="ratio ratio-16x9">
                            <video id="mainVideo" controls autoplay controlsList="nodownload" oncontextmenu="return false;">
                                <source th:src="@{'/video_files/' + ${lesson.videoUrl}}" type="video/mp4">
                                브라우저가 비디오 태그를 지원하지 않습니다.
                            </video>
                        </div>
                    </div>

                    <style>
                        /* 비디오 플레이어 스타일 커스텀 */
                        video {
                            width: 100%;
                            height: 100%;
                            background: #000;
                            outline: none;
                        }
                    </style>

                </div>
            </div>
            <div class="mt-4 p-3 bg-white rounded shadow-sm">
                <h5>강의 소개</h5>
                <p class="text-muted" th:text="${lesson.course.description}">강의 설명이 출력됩니다.</p>
            </div>

            <!-- 추가 시작 -->
            <button id="completeBtn" class="btn btn-outline-success btn-lg" disabled>
                <i class="bi bi-check-circle"></i> 학습 완료하기
            </button>

            <script th:inline="javascript">
                const video = document.querySelector('video');
                const completeBtn = document.getElementById('completeBtn');
                const lessonId = [[${lesson.id}]]; // Thymeleaf 변수 사용

                // 1. 영상 재생이 완료되면 버튼 활성화
                video.onended = function() {
                    completeBtn.disabled = false;
                    completeBtn.classList.replace('btn-outline-success', 'btn-success');
                    alert("영상을 끝까지 시청하셨습니다. '학습 완료하기' 버튼을 눌러주세요.");
                };

                // 2. 완료 버튼 클릭 시 서버로 상태 전송 (Fetch API 사용)
                completeBtn.onclick = function() {
                    fetch('/lesson/complete/' + lessonId, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    })
                        .then(response => {
                            if (response.ok) {
                                alert("학습 완료 처리가 되었습니다!");
                                completeBtn.innerText = "학습 완료됨";
                                completeBtn.disabled = true;

                                // 우측 리스트에 체크 표시를 하거나 다음 차시로 이동 유도 가능
                                location.reload();
                            }
                        })
                        .catch(error => console.error('Error:', error));
                };
            </script>
            <!-- 추가 종료 -->


            <div th:if="${lesson.fileName != null}" class="mt-3 p-3 border rounded bg-light">
                <h6><i class="bi bi-file-earmark-arrow-down"></i> 학습 자료</h6>
                <a th:href="@{/lesson/download/{id}(id=${lesson.id})}" class="btn btn-sm btn-outline-dark">
                    <span th:text="${lesson.fileOrigin}">강의자료.pdf</span> 다운로드
                </a>
            </div>


        </div>

        <div class="col-lg-3 p-0 sidebar">
            <div class="p-3 border-bottom bg-light">
                <h6 class="mb-0 fw-bold">커리큘럼</h6>
            </div>
            <div class="list-group list-group-flush">
                <a th:each="item : ${lessonList}"
                   th:href="@{/lesson/view/{id}(id=${item.id})}"
                   class="list-group-item list-group-item-action p-3 lesson-item"
                   th:classappend="${item.id == lesson.id} ? 'active' : ''">
                    <div class="d-flex w-100 justify-content-between">
                        <span th:text="${item.sequence + '. ' + item.title}">1. 차시 제목</span>
                        <i th:if="${item.id == lesson.id}" class="bi bi-play-circle-fill text-primary"></i>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
    const video = document.getElementById('mainVideo');

    // 영상 재생이 끝났을 때 실행
    video.onended = function() {
        alert("학습을 완료했습니다!");
        // 여기서 AJAX를 이용해 서버에 "학습 완료" 상태를 전송할 수 있습니다.
    };

    // (선택) 10초마다 현재 재생 시간을 로그로 남기거나 서버에 저장
    /*
    video.ontimeupdate = function() {
        console.log("현재 재생 시간: " + video.currentTime);
    };
    */
</script>
