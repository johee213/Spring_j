<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LMS - 차시 수정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>차시 정보 수정</h2>

<form name="sujungForm" method="post" action="/lesson/sujungProc" class="mt-4">
    <input type="hidden" name="id" th:value="${lesson.id}">
    <input type="hidden" name="courseId" th:value="${lesson.course.id}">

    <div class="mb-3">
        <label class="form-label">차시 제목</label>
        <input type="text" name="title" th:value="${lesson.title}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">영상 URL</label>
        <input type="text" name="videoUrl" th:value="${lesson.videoUrl}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">노출 순서</label>
        <input type="number" name="sequence" th:value="${lesson.sequence}" class="form-control">
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary">수정 완료</button>
        <a th:href="@{|/course/view/${lesson.course.id}|}" class="btn btn-secondary">취소</a>
    </div>
</form>

</body>
</html>
