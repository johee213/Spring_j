<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<div style="padding: 20px 0px 0px 0px;">
    |
    <a href="/">Home</a>
    |
    <a href="/member/list">회원관리</a>
    |
    <a href="/memo/list">메모장</a>
    |
</div>

<h1>메모장 삭제</h1>

<form name="form" method="post" action="/memo/sakjeProc">
    <input type="hidden" name="id" th:value="${memo.id}">

    제목 : <span th:text="${memo.subject}"></span><br>
    내용 : <span th:text="${memo.content}"></span><br>
    작성자 : <span th:text="${memo.writer}"></span><br>

    <br><br>
    <button type="submit">삭제하기</button>
    <button type="button" onclick="location.href='/memo/list';">목록으로</button>
</form>

</body>
</html>
