<h1>메모장 목록</h1>

<table border="1">
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
    </tr>

    <tr th:each="memo : ${list}">
        <td th:text="${memo.id}"></td>
        <td>
            <a th:href="@{|/memo/view/${memo.id}|}" th:text="${memo.subject}"></a>
        </td>
        <td th:text="${memo.writer}"></td>
    </tr>
</table>
