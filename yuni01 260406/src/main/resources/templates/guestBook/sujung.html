<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>방명록 수정</h1>

<form name="form" method="post" action="/guestBook/sujungProc">
    <input type="hidden" name="id" th:value="${guestBook.id}">

    이름 : <span th:text="${guestBook.name}"></span><br>
    이메일 : <input type="text" name="email" th:value="${guestBook.email}"><br>
    비밀번호 : <input type="password" name="password"><br>
    내용 : <textarea name="content" style="width:200px; height:100px;">[[${guestBook.content}]]</textarea><br>

    <br><br>
    <button type="submit">수정하기</button>
    <button type="button" onclick="location.href='/guestBook/list';">목록으로</button>
</form>

</body>
</html>
