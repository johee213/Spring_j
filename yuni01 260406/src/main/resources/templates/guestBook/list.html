<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>방명록 목록</h1>

<table border="1">
    <tr>
        <th>번호</th>
        <th>이름</th>
        <th>이메일</th>
        <th>내용</th>
    </tr>

    <tr th:each="guestBook : ${list}">
        <td th:text="${guestBook.id}"></td>
        <td>
            <a th:href="@{|/guestBook/view/${guestBook.id}|}" th:text="${guestBook.name}"></a>
        </td>
        <td th:text="${guestBook.email}"></td>
        <td th:text="${guestBook.content}"></td>
    </tr>
</table>

<br>
|
<a href="/guestBook/chuga">등록</a>
|

</body>
</html>
